<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CHARMZ &mdash; Fashion of the Day</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Navigation -->
  <nav class="nav">
    <div class="nav-inner">
      <a href="#" class="logo">CHARMZ</a>
      <div class="nav-links">
        <a href="#featured">Today's Pick</a>
        <a href="#collection">Collection</a>
        <a href="#trending">Trending</a>
      </div>
      <button class="nav-toggle" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- Hero -->
  <header class="hero" id="featured">
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <p class="hero-label">Fashion of the Day</p>
      <h1 class="hero-title" id="hero-title"></h1>
      <p class="hero-subtitle" id="hero-subtitle"></p>
      <div class="hero-meta">
        <span class="hero-price" id="hero-price"></span>
        <span class="hero-designer" id="hero-designer"></span>
      </div>
      <a href="#" class="btn btn-primary" id="hero-cta">Shop Now</a>
    </div>
    <div class="hero-image-wrapper">
      <div class="hero-image" id="hero-image"></div>
    </div>
    <div class="hero-nav">
      <button class="hero-nav-btn" id="prev-day" aria-label="Previous">&larr;</button>
      <span class="hero-day-label" id="day-label"></span>
      <button class="hero-nav-btn" id="next-day" aria-label="Next">&rarr;</button>
    </div>
  </header>

  <!-- Details Panel (slides in on click) -->
  <section class="detail-panel" id="detail-panel">
    <button class="detail-close" id="detail-close">&times;</button>
    <div class="detail-inner">
      <div class="detail-gallery" id="detail-gallery"></div>
      <div class="detail-info">
        <p class="detail-label">Featured Piece</p>
        <h2 class="detail-title" id="detail-title"></h2>
        <p class="detail-designer" id="detail-designer"></p>
        <p class="detail-description" id="detail-description"></p>
        <div class="detail-specs">
          <div class="spec">
            <span class="spec-label">Material</span>
            <span class="spec-value" id="detail-material"></span>
          </div>
          <div class="spec">
            <span class="spec-label">Season</span>
            <span class="spec-value" id="detail-season"></span>
          </div>
          <div class="spec">
            <span class="spec-label">Available Sizes</span>
            <span class="spec-value" id="detail-sizes"></span>
          </div>
        </div>
        <div class="detail-price-row">
          <span class="detail-price" id="detail-price"></span>
          <a href="#" class="btn btn-primary btn-purchase" id="detail-purchase">Purchase &rarr;</a>
        </div>
      </div>
    </div>
  </section>

  <!-- Collection Grid -->
  <section class="collection" id="collection">
    <div class="section-header">
      <p class="section-label">Curated</p>
      <h2 class="section-title">The Collection</h2>
    </div>
    <div class="collection-grid" id="collection-grid"></div>
  </section>

  <!-- Trending -->
  <section class="trending" id="trending">
    <div class="section-header">
      <p class="section-label">What's Hot</p>
      <h2 class="section-title">Trending Now</h2>
    </div>
    <div class="trending-marquee">
      <div class="marquee-track" id="marquee-track"></div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-inner">
      <a href="#" class="logo">CHARMZ</a>
      <p class="footer-tagline">Curating tomorrow's fashion, today.</p>
      <div class="footer-links">
        <a href="#">About</a>
        <a href="#">Contact</a>
        <a href="#">Shipping</a>
        <a href="#">Returns</a>
      </div>
      <p class="footer-copy">&copy; 2026 CHARMZ. All rights reserved.</p>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
